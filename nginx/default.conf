# 1. Redirect HTTP (80) to HTTPS (443)
server {
    listen 80;
    server_name smcmahon-cms-glance-demo.com www.smcmahon-cms-glance-demo.com smcm-cern-demo.com www.smcm-cern-demo.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server Configuration
server {
    listen 443 ssl;
    server_name smcmahon-cms-glance-demo.com www.smcmahon-cms-glance-demo.com smcm-cern-demo.com www.smcm-cern-demo.com;

    # SSL Certs (Initially using the existing path; Certbot will update this)
    ssl_certificate /etc/letsencrypt/live/smcmahon-cms-glance-demo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smcmahon-cms-glance-demo.com/privkey.pem;

    # Recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Frontend Vue Application
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Django API / Admin
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Java Telemetry Service API
    location /api/v1/telemetry/ {
        proxy_pass http://telemetry-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static Files
    location /django_static/ {
        alias /app/staticfiles/;
    }

    # Security: Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}