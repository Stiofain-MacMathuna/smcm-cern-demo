version: '3.8'

services:
  db:
    image: postgres:15
    container_name: glance-db
    restart: always
    environment:
      - POSTGRES_DB=glance_db
      - POSTGRES_USER=glance_user
      - POSTGRES_PASSWORD=glance_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glance_user -d glance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: glance-backend
    restart: always
    command: ./entrypoint.sh
    environment:
      - DB_HOST=db
      - POSTGRES_DB=glance_db
      - POSTGRES_USER=glance_user
      - POSTGRES_PASSWORD=glance_pass
    depends_on:
      db:
        condition: service_healthy

  telemetry-service:
    build: ./telemetry-service
    container_name: telemetry-service
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/glance_db
      - SPRING_DATASOURCE_USERNAME=glance_user
      - SPRING_DATASOURCE_PASSWORD=glance_pass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/telemetry/history"]
      interval: 15s
      start_period: 60s

  lhc-sensor:
    build: ./lhc-sensor-simulator
    container_name: lhc-sensor
    restart: always
    environment:
      - INGEST_URL=http://telemetry-service:8080/api/v1/telemetry/ingest
    depends_on:
      telemetry-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: glance-frontend
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      telemetry-service:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume: