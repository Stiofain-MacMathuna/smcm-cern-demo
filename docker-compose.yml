services:
  # 1. Database (Shared by Java and Python)
  db:
    image: postgres:15
    container_name: glance-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=glance_db
      - POSTGRES_USER=glance_user
      - POSTGRES_PASSWORD=glance_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glance_user -d glance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Python Backend (Django)
  backend:
    build: ./backend
    container_name: glance-backend
    restart: always
    command: ./entrypoint.sh
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
    environment:
      - POSTGRES_DB=glance_db
      - POSTGRES_USER=glance_user
      - POSTGRES_PASSWORD=glance_pass
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # 3. Java Telemetry Service (Spring Boot)
  telemetry-service:
    build: ./telemetry-service
    container_name: telemetry-service
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/glance_db
      - SPRING_DATASOURCE_USERNAME=glance_user
      - SPRING_DATASOURCE_PASSWORD=glance_pass
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Using a basic curl to the ingest endpoint or actuator if available
      # This ensures the sensor doesn't start until the JVM is warm
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/telemetry/history"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 4. C++ Sensor Simulator
  lhc-sensor:
    build: ./lhc-sensor-simulator
    container_name: lhc-sensor
    restart: always
    environment:
      - INGEST_URL=http://telemetry-service:8080/api/v1/telemetry/ingest
      - API_BASE_URL=http://glance-backend:8000
    depends_on:
      telemetry-service:
        condition: service_healthy
      backend:
        condition: service_started

  # 5. Vue Frontend (Nginx)
  frontend:
    build: ./frontend
    container_name: glance-frontend
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    ports:
      - "80:80"
    depends_on:
      - backend
      - telemetry-service

volumes:
  postgres_data:
  static_volume: